    <rect x="474.0" y="299.8" width="16" height="16" fill="#3f72c8"/>
    <text x="482.0" y="289.8" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#3f72c8">59.3%</text>
    <rect x="880.0" y="349.6" width="16" height="16" fill="#3f72c8"/>
